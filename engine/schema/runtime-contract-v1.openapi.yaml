openapi: 3.1.0
info:
  title: AgentBreeder Runtime Contract
  version: "1"
  summary: HTTP contract that every AgentBreeder agent container exposes.
  description: |
    Versioned, language-agnostic HTTP contract that every AgentBreeder agent
    container exposes. See engine/schema/runtime-contract-v1.md for the
    prose specification. This OpenAPI document is the canonical source for
    request and response shapes; SDK codegen targets this file.
  contact:
    name: AgentBreeder
    url: https://github.com/agentbreeder/agentbreeder
  license:
    name: Apache-2.0
    identifier: Apache-2.0
  x-agentbreeder-runtime-contract: "1"

servers:
  - url: http://localhost:8080
    description: Local dev (default port; deployer-injected in production)
    variables: {}

security:
  - bearerAuth: []

tags:
  - name: liveness
    description: Health check endpoints — open, no auth.
  - name: invoke
    description: Synchronous and streaming agent runs — bearer-auth.
  - name: discovery
    description: Self-describing metadata endpoints — open.

paths:
  /health:
    get:
      tags: [liveness]
      operationId: getHealth
      summary: Liveness/readiness probe
      description: |
        Open endpoint. Cloud platform liveness probes hit this without
        credentials. Returns 200 with a body that distinguishes `healthy`
        (loaded, ready to invoke) from `loading` (booting).
      security: []
      responses:
        "200":
          description: Container is reachable.
          headers:
            X-Runtime-Contract-Version:
              $ref: "#/components/headers/XRuntimeContractVersion"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /openapi.json:
    get:
      tags: [discovery]
      operationId: getOpenAPI
      summary: Self-describing OpenAPI document
      description: |
        Open endpoint. Optional in v1 — Tier 1 runtimes (Python FastAPI,
        Node) get it for free; Tier 2 SDKs SHOULD generate and serve it;
        Tier 3 (BYO) MAY omit it. The document SHOULD include
        `info.x-agentbreeder-runtime-contract: "1"`.
      security: []
      responses:
        "200":
          description: OpenAPI document for this agent.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "404":
          description: Not implemented by this agent.

  /.well-known/agent.json:
    get:
      tags: [discovery]
      operationId: getAgentCard
      summary: A2A agent card
      description: |
        Open endpoint. Required when the agent is exposed for A2A;
        optional otherwise. Returns the agent's name, version,
        framework, and the endpoint paths it exposes.
      security: []
      responses:
        "200":
          description: A2A agent card.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentCard"
        "404":
          description: Agent card not exposed.

  /invoke:
    post:
      tags: [invoke]
      operationId: invokeAgent
      summary: Synchronous agent run
      description: |
        Bearer-auth. Runs the agent and returns its final output (or the
        paused state, if the run hit a HITL interrupt — see
        `metadata.interrupted`).
      parameters:
        - $ref: "#/components/parameters/XTraceId"
        - $ref: "#/components/parameters/XSessionId"
        - $ref: "#/components/parameters/XIdempotencyKey"
        - $ref: "#/components/parameters/XRequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvokeRequest"
      responses:
        "200":
          description: Run completed.
          headers:
            X-Runtime-Contract-Version:
              $ref: "#/components/headers/XRuntimeContractVersion"
            X-Trace-Id:
              $ref: "#/components/headers/XTraceIdResponse"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvokeResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/Unavailable"

  /stream:
    post:
      tags: [invoke]
      operationId: streamAgent
      summary: Streaming agent run via Server-Sent Events
      description: |
        Bearer-auth. Identical body to `/invoke`. Response is
        `text/event-stream`; see the markdown spec §4.3 for the SSE event
        contract. Every stream MUST end with `data: [DONE]\n\n`.
      parameters:
        - $ref: "#/components/parameters/XTraceId"
        - $ref: "#/components/parameters/XSessionId"
        - $ref: "#/components/parameters/XRequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvokeRequest"
      responses:
        "200":
          description: SSE stream opened.
          headers:
            X-Runtime-Contract-Version:
              $ref: "#/components/headers/XRuntimeContractVersion"
            Cache-Control:
              schema: { type: string, const: "no-cache" }
            X-Accel-Buffering:
              schema: { type: string, const: "no" }
          content:
            text/event-stream:
              schema:
                type: string
                description: |
                  SSE stream. Events are either implicit `data: {...}` (text
                  deltas) or named `event: <name>\ndata: {...}` (structured
                  updates). Always terminates with `data: [DONE]\n\n`.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/Unavailable"

  /resume:
    post:
      tags: [invoke]
      operationId: resumeAgent
      summary: Resume a paused (HITL) agent run
      description: |
        Bearer-auth. Optional in v1 — only frameworks with checkpointing
        (LangGraph) implement it. Other agents return 404 or 501.
      parameters:
        - $ref: "#/components/parameters/XTraceId"
        - $ref: "#/components/parameters/XRequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResumeRequest"
      responses:
        "200":
          description: Resumed and produced output.
          headers:
            X-Runtime-Contract-Version:
              $ref: "#/components/headers/XRuntimeContractVersion"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvokeResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Thread/session id not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "501":
          description: Runtime does not support `/resume`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          $ref: "#/components/responses/Unavailable"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque
      description: |
        Bearer token from `AGENT_AUTH_TOKEN` env var. Auth is disabled when
        the env var is unset/empty (local dev). `/health`, `/openapi.json`,
        and `/.well-known/agent.json` are always open.

  headers:
    XRuntimeContractVersion:
      description: Decimal contract version implemented by this agent.
      required: true
      schema:
        type: string
        const: "1"
    XTraceIdResponse:
      description: OpenTelemetry trace id for the run (sidecar-set).
      required: false
      schema:
        type: string

  parameters:
    XTraceId:
      name: X-Trace-Id
      in: header
      required: false
      description: Upstream OpenTelemetry trace id to propagate as parent span.
      schema:
        type: string
    XSessionId:
      name: X-Session-Id
      in: header
      required: false
      description: |
        Conversation/thread id. Equivalent to `session_id` in the body —
        body field wins on conflict.
      schema:
        type: string
    XIdempotencyKey:
      name: X-Idempotency-Key
      in: header
      required: false
      description: |
        Caller-supplied idempotency key. Reserved for v1 — agents MAY ignore.
      schema:
        type: string
    XRequestId:
      name: X-Request-Id
      in: header
      required: false
      description: Caller-supplied request id; logged by the sidecar.
      schema:
        type: string

  responses:
    BadRequest:
      description: Malformed JSON, missing required field, or unknown content-type.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    Unauthorized:
      description: Missing `Authorization` header on a protected endpoint.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    Forbidden:
      description: Bearer token does not match `AGENT_AUTH_TOKEN`.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    UnprocessableEntity:
      description: Body parsed but failed validation.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    InternalError:
      description: Unhandled exception in the agent code.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    Unavailable:
      description: Agent not loaded yet.
      headers:
        Retry-After:
          schema:
            type: string
          description: Seconds to wait before retrying.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"

  schemas:

    HealthResponse:
      type: object
      required: [status, agent_name, version]
      properties:
        status:
          type: string
          description: |
            One of `healthy` (loaded, ready) or `loading` (booting). The
            string `ok` is accepted as an alias for `healthy` for backward
            compatibility but new implementations MUST emit `healthy`.
          enum: [healthy, loading, ok]
          examples: [healthy]
        agent_name:
          type: string
          description: "Agent slug (matches `agent.yaml: name`)."
        version:
          type: string
          description: "Agent SemVer (matches `agent.yaml: version`)."
        framework:
          type: string
          description: Optional framework hint (e.g. `langgraph`, `vercel-ai`).

    AgentCard:
      type: object
      required: [name, version, endpoints]
      properties:
        name:
          type: string
        version:
          type: string
        framework:
          type: string
        protocol:
          type: string
          examples: [a2a-v1]
        endpoints:
          type: object
          additionalProperties: { type: string }
          examples:
            - invoke: /invoke
              stream: /stream
              health: /health

    InvokeRequest:
      type: object
      required: [input]
      properties:
        input:
          description: |
            Free-form input. String for chat-style agents; object for
            graph-style agents (e.g. LangGraph `{"messages": [...]}`).
            SDKs MUST support both.
          oneOf:
            - type: string
            - type: object
              additionalProperties: true
            - type: array
        session_id:
          type: string
          description: |
            Conversation/thread id. Honored by frameworks that support it
            (LangGraph, Google ADK), ignored otherwise.
        config:
          type: object
          description: |
            Free-form, framework-specific config bag. Pass-through to the
            underlying framework's invoke `config` parameter.
          additionalProperties: true
        metadata:
          type: object
          description: Free-form caller metadata.
          additionalProperties: true

    InvokeResponse:
      type: object
      required: [output]
      properties:
        output:
          description: |
            Agent response. Shape mirrors the framework: chat returns a
            string; graph returns the final state.
          oneOf:
            - type: string
            - type: object
              additionalProperties: true
            - type: array
        session_id:
          type: string
          description: Echoed/generated thread id.
        metadata:
          type: object
          description: |
            Free-form, framework-specific. Notable optional keys:
            `interrupted` (bool), `mode`, `output_schema_errors`.
          additionalProperties: true
        trace_id:
          type: string
          description: Reserved — populated by the sidecar in Track J.
        tokens:
          type: object
          description: Reserved — populated by the sidecar in Track J.
          properties:
            input:
              type: integer
              minimum: 0
            output:
              type: integer
              minimum: 0
            total:
              type: integer
              minimum: 0
        cost_usd:
          type: number
          minimum: 0
          description: Reserved — populated by the sidecar in Track J.
        model:
          type: string
          description: Reserved — populated by the sidecar in Track J.
        latency_ms:
          type: integer
          minimum: 0
          description: Reserved — populated by the sidecar in Track J.

    ResumeRequest:
      type: object
      required: [thread_id, human_input]
      properties:
        thread_id:
          type: string
        human_input:
          description: Human response to feed back into the paused graph.

    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              description: Stable, machine-readable code (SCREAMING_SNAKE_CASE).
              examples: [AGENT_NOT_LOADED, INVALID_INPUT, INTERNAL_ERROR]
            message:
              type: string
              description: Human-readable summary.
            details:
              description: Free-form detail object.
        trace_id:
          type: string
          description: OpenTelemetry trace id, when available.

    SseTextDelta:
      type: object
      description: |
        Implicit `data:` event — text streaming. New runtimes SHOULD emit
        `delta`; SDKs MUST accept both `delta` and `text`.
      properties:
        delta:
          type: string
        text:
          type: string

    SseStepEvent:
      type: object
      description: "Named `event: step` — intermediate framework step."
      required: [description]
      properties:
        description:
          type: string
        result:
          description: Free-form step output.

    SseToolCallEvent:
      type: object
      description: "Named `event: tool_call` — tool invocation delta."
      required: [name]
      properties:
        name:
          type: string
        args:
          type: object
          additionalProperties: true

    SseErrorEvent:
      type: object
      description: |
        Named `event: error` — emitted before the stream terminates if the
        run fails.
      required: [error]
      properties:
        error:
          type: string

    SseResultEvent:
      type: object
      description: |
        Named `event: result` — final aggregated payload (CrewAI today).
      required: [output]
      properties:
        output: {}
