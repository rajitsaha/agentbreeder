# E2E test overrides for docker-compose.yml
# Usage: docker compose -f deploy/docker-compose.yml -f deploy/docker-compose.e2e.yml up -d

services:
  postgres:
    volumes:
      - pgdata-e2e:/var/lib/postgresql/data

  api:
    # CI sets IMAGE_API to the pre-built tag; locally Docker will build via the build: section below
    image: ${IMAGE_API:-}
    # depends_on is intentionally omitted here — CI health-waits are handled by the workflow step
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://agentbreeder:agentbreeder@postgres:5432/agentbreeder
      REDIS_URL: redis://redis:6379
      GARDEN_ENV: test
      SECRET_KEY: e2e-test-secret-key-not-for-prod
      JWT_SECRET_KEY: e2e-test-jwt-key-not-for-prod
      ACCESS_TOKEN_EXPIRE_MINUTES: "1440"

  migrate:
    # Same image as api
    image: ${IMAGE_API:-}
    build:
      context: ..
      dockerfile: Dockerfile

  dashboard:
    # CI sets IMAGE_DASHBOARD to the pre-built tag; locally Docker will build via the build: section below
    image: ${IMAGE_DASHBOARD:-}
    build:
      context: ../dashboard
      dockerfile: Dockerfile

  # Disable litellm in E2E (not needed, saves startup time)
  litellm:
    profiles:
      - disabled-in-e2e

volumes:
  pgdata-e2e:
