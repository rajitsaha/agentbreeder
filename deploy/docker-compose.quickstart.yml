# AgentBreeder — Quickstart Stack
# Launched by: agentbreeder quickstart
#
# Includes everything needed for a full local demo:
#   Postgres, Redis, ChromaDB (RAG), Neo4j (GraphRAG),
#   MCP filesystem server, API, Dashboard, LiteLLM gateway
#
# Ports used:
#   5432  PostgreSQL
#   6379  Redis
#   8000  AgentBreeder API
#   3001  AgentBreeder Dashboard
#   4000  LiteLLM gateway
#   8001  ChromaDB (vector store)
#   7474  Neo4j Browser
#   7687  Neo4j Bolt

services:

  # ── Infrastructure ───────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agentbreeder
      POSTGRES_USER: agentbreeder
      POSTGRES_PASSWORD: agentbreeder
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentbreeder -d agentbreeder"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Vector Store (RAG) ───────────────────────────────────────────────

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chromadata:/chroma/chroma
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/8000 && printf 'GET /api/v2/heartbeat HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && grep -q '200' <&3"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ── Graph Database (GraphRAG) ────────────────────────────────────────

  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt
    environment:
      NEO4J_AUTH: neo4j/agentbreeder
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
    volumes:
      - neo4jdata:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s

  # ── MCP Servers ──────────────────────────────────────────────────────

  mcp-filesystem:
    image: node:20-alpine
    working_dir: /app
    command: >
      sh -c "npm install -g @modelcontextprotocol/server-filesystem &&
             npx @modelcontextprotocol/server-filesystem /workspace"
    volumes:
      - ./mcp_workspace:/workspace
    ports:
      - "3100:3100"
    environment:
      PORT: "3100"

  mcp-memory:
    image: node:20-alpine
    working_dir: /app
    command: >
      sh -c "npm install -g @modelcontextprotocol/server-memory &&
             npx @modelcontextprotocol/server-memory"
    ports:
      - "3101:3101"
    environment:
      PORT: "3101"

  # ── AgentBreeder Platform ────────────────────────────────────────────

  migrate:
    image: rajits/agentbreeder-api:latest
    command: ["alembic", "upgrade", "head"]
    environment:
      DATABASE_URL: postgresql+asyncpg://agentbreeder:agentbreeder@postgres:5432/agentbreeder
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    image: rajits/agentbreeder-api:latest
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://agentbreeder:agentbreeder@postgres:5432/agentbreeder
      REDIS_URL: redis://redis:6379
      AGENTBREEDER_ENV: development
      SECRET_KEY: ${SECRET_KEY:-quickstart-secret-key-change-in-prod}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-quickstart-jwt-key-change-in-prod}
      LITELLM_BASE_URL: http://litellm:4000
      CHROMADB_URL: http://chromadb:8000
      NEO4J_URL: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: agentbreeder
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-agentbreeder-quickstart}
    volumes:
      - ../api:/app/api:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    extra_hosts:
      - "host.docker.internal:host-gateway"

  dashboard:
    image: rajits/agentbreeder-dashboard:latest
    build:
      context: ../dashboard
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      api:
        condition: service_healthy

  # ── LiteLLM Model Gateway ────────────────────────────────────────────

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://agentbreeder:agentbreeder@postgres:5432/litellm
      STORE_MODEL_IN_DB: "True"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-agentbreeder-quickstart}
    depends_on:
      postgres:
        condition: service_healthy
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    volumes:
      - ./litellm_config.quickstart.yaml:/app/config.yaml
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  pgdata:
  chromadata:
  neo4jdata:
