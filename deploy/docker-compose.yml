services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agentbreeder
      POSTGRES_USER: garden
      POSTGRES_PASSWORD: garden
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U garden -d agentbreeder"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://garden:garden@postgres:5432/agentbreeder
      REDIS_URL: redis://redis:6379
      GARDEN_ENV: development
      SECRET_KEY: docker-dev-secret-key-change-in-prod
      JWT_SECRET_KEY: docker-dev-jwt-key-change-in-prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  migrate:
    build:
      context: ..
      dockerfile: Dockerfile
    command: ["alembic", "upgrade", "head"]
    environment:
      DATABASE_URL: postgresql+asyncpg://garden:garden@postgres:5432/agentbreeder
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  dashboard:
    build:
      context: ../dashboard
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    depends_on:
      api:
        condition: service_healthy

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://garden:garden@postgres:5432/agentbreeder
      STORE_MODEL_IN_DB: "True"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    volumes:
      - ./litellm_config.yaml:/app/config.yaml
    restart: unless-stopped

  mcp-example:
    build:
      context: ../examples/mcp-server
      dockerfile: Dockerfile
    command: ["python", "server.py"]
    profiles:
      - examples

volumes:
  pgdata:
