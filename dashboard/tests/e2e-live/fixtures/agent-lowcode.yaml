name: e2e-agent-lowcode
version: 1.0.0
description: E2E test agent created via YAML editor
team: e2e-team-alpha
owner: e2e-admin@test.local
tags: [e2e, test, lowcode]

model:
  primary: fake/gpt-4
  gateway: litellm
  temperature: 0.7
  max_tokens: 512

framework: langgraph

prompts:
