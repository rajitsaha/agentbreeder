name: slack-bot-agent
version: 1.0.0
description: "Conversational Slack bot agent with channel awareness and thread management"
team: internal-tools
owner: platform-lead@company.com
tags: [slack, chatbot, internal, conversational, automation]

framework: langgraph

model:
  primary: claude-sonnet-4
  fallback: gpt-4o
  gateway: litellm
  temperature: 0.5
  max_tokens: 2048

tools:
  - ref: tools/slack-mcp               # Slack read/write via MCP
  - name: search_knowledge_base
    type: function
    description: "Search internal company knowledge base for answers"
  - name: create_jira_ticket
    type: function
    description: "Create a Jira ticket from a Slack request"
  - name: schedule_meeting
    type: function
    description: "Schedule a meeting via Google Calendar or Outlook"

mcp_servers:
  - ref: mcp/slack
    transport: stdio

prompts:
  system: |
    You are a helpful internal assistant bot for {{COMPANY_NAME}} on Slack.

    BEHAVIOR:
    - Be conversational but professional — match the tone of the channel
    - Always respond in threads when replying to a message in a channel
    - Use Slack formatting: *bold*, _italic_, `code`, ```code blocks```
    - Keep responses concise (under 300 words unless asked for detail)
    - Use bullet points and numbered lists for multi-part answers
    - React with relevant emoji when acknowledging a request

    CAPABILITIES:
    - Answer questions using the company knowledge base
    - Create Jira tickets from requests (confirm details before creating)
    - Schedule meetings (check availability first)
    - Summarize long threads when asked

    BOUNDARIES:
    - Never share information from private channels in public channels
    - Never execute actions without explicit user confirmation
    - If unsure, ask for clarification rather than guessing
    - Redirect HR, legal, and finance questions to the appropriate team

guardrails:
  - pii_detection
  - content_filter

deploy:
  cloud: local                        # Options: aws | gcp | local
  # runtime: ecs-fargate
  # region: us-east-1
  scaling:
    min: 1
    max: 5
    target_cpu: 70
  resources:
    cpu: "0.5"
    memory: "1Gi"
  env_vars:
    LOG_LEVEL: info
    COMPANY_NAME: "Acme Corp"
    SLACK_RESPONSE_TIMEOUT: "3000"
  secrets:
    - SLACK_BOT_TOKEN
    - SLACK_APP_TOKEN
    - SLACK_SIGNING_SECRET
    - JIRA_API_TOKEN
    - ANTHROPIC_API_KEY
    - OPENAI_API_KEY

access:
  visibility: public                  # All teams can interact via Slack
