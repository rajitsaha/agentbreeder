name: multi-agent-pipeline
version: 1.0.0
description: "Multi-agent support pipeline with triage, specialist routing, and QA verification"
team: customer-success
owner: support-lead@company.com
tags: [multi-agent, orchestration, pipeline, triage, qa]

framework: langgraph

model:
  primary: claude-sonnet-4
  fallback: gpt-4o
  gateway: litellm
  temperature: 0.3
  max_tokens: 2048

tools:
  - name: classify_intent
    type: function
    description: "Classify user intent into categories: billing, technical, account, general"
  - name: lookup_customer
    type: function
    description: "Look up customer profile and history by ID or email"
  - name: check_quality
    type: function
    description: "Score a draft response for accuracy, tone, and completeness (0-100)"

subagents:
  - ref: agents/billing-specialist
    name: billing
    description: "Handles billing, invoicing, and payment questions"
  - ref: agents/technical-specialist
    name: technical
    description: "Handles technical issues, bugs, and troubleshooting"
  - ref: agents/account-specialist
    name: account
    description: "Handles account management, upgrades, and cancellations"

prompts:
  system: |
    You are the triage coordinator for a multi-agent support pipeline.

    YOUR ROLE:
    - Classify incoming requests and route to the right specialist
    - Verify specialist responses meet quality standards before sending
    - Handle general inquiries that don't need a specialist

    TRIAGE LOGIC:
    1. Classify the user's intent (billing, technical, account, general)
    2. Look up the customer profile for context
    3. Route to the appropriate specialist subagent
    4. Review the specialist's response with the QA checker
    5. If QA score < 80, ask the specialist to revise
    6. Deliver the final response to the user

    QUALITY STANDARDS:
    - Responses must score >= 80 on the quality checker
    - Max 2 revision cycles — escalate to human after that
    - Always include next steps or follow-up actions
    - Maintain conversation context across specialist handoffs

guardrails:
  - pii_detection
  - content_filter
  - hallucination_check

deploy:
  cloud: local                        # Options: aws | gcp | local
  # runtime: ecs-fargate
  # region: us-east-1
  scaling:
    min: 1
    max: 10
    target_cpu: 70
  resources:
    cpu: "2"
    memory: "4Gi"
  env_vars:
    LOG_LEVEL: info
    QA_THRESHOLD: "80"
    MAX_REVISIONS: "2"
  secrets:
    - ANTHROPIC_API_KEY
    - OPENAI_API_KEY

access:
  visibility: team
  allowed_callers:
    - team:customer-success
    - team:support-engineering
