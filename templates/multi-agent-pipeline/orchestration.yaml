# Multi-Agent Support Pipeline — Orchestration Configuration
#
# Strategy: supervisor
#   - Triage agent acts as supervisor, routing to specialist agents
#   - QA agent verifies responses before delivery
#
# Usage:
#   garden orchestration validate ./orchestration.yaml
#   garden orchestration deploy ./orchestration.yaml
#   garden orchestration chat multi-agent-support-pipeline

name: multi-agent-support-pipeline
version: 1.0.0
description: "Triage -> Specialist -> QA multi-agent support pipeline"
team: customer-success
owner: support-lead@company.com

strategy: supervisor

agents:
  triage:
    ref: agents/multi-agent-pipeline
    routes:
      - condition: "billing"
        target: billing-specialist
      - condition: "technical"
        target: technical-specialist
      - condition: "account"
        target: account-specialist
    fallback: triage                  # Handle general queries directly

  billing-specialist:
    ref: agents/billing-specialist
    routes:
      - condition: "always"
        target: qa-reviewer
    fallback: triage

  technical-specialist:
    ref: agents/technical-specialist
    routes:
      - condition: "always"
        target: qa-reviewer
    fallback: triage

  account-specialist:
    ref: agents/account-specialist
    routes:
      - condition: "always"
        target: qa-reviewer
    fallback: triage

  qa-reviewer:
    ref: agents/qa-reviewer
    routes:
      - condition: "score >= 80"
        target: triage               # Return to triage for delivery
      - condition: "score < 80"
        target: triage               # Return for revision routing

shared_state:
  type: dict
  backend: redis                      # Use redis for production; in_memory for local

supervisor_config:
  supervisor_agent: triage
  max_iterations: 5                   # Max triage -> specialist -> QA cycles

deploy:
  target: local                       # Options: aws | gcp | local
  resources:
    cpu: "2"
    memory: "4Gi"
