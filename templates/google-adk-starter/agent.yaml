name: google-adk-starter
version: 1.0.0
description: "Google ADK starter agent with function declarations and Gemini"
team: engineering
owner: dev@company.com
tags: [google, adk, gemini, starter, tools]

framework: google_adk

model:
  primary: gemini-2.0-flash
  fallback: gemini-1.5-pro
  temperature: 0.5
  max_tokens: 2048

tools:
  - name: search_web
    type: function
    description: "Search the web for information"
  - name: get_stock_price
    type: function
    description: "Get the current stock price for a ticker symbol"

prompts:
  system: |
    You are a helpful assistant built with Google's Agent Development Kit (ADK).
    Use your tools to provide accurate, real-time information. Be concise and helpful.
    When providing financial data, always include a disclaimer that it may be delayed.

guardrails:
  - pii_detection

deploy:
  cloud: local                        # Options: aws | gcp | local
  # runtime: cloud-run                # Uncomment for GCP
  # region: us-central1
  scaling:
    min: 1
    max: 5
    target_cpu: 70
  resources:
    cpu: "0.5"
    memory: "1Gi"
  env_vars:
    LOG_LEVEL: info
  secrets:
    - GOOGLE_API_KEY
