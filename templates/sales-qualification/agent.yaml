name: sales-qualification-agent
version: 1.0.0
description: "Lead qualification agent with CRM integration, scoring, and automated outreach"
team: sales
owner: sales-ops@company.com
tags: [sales, crm, lead-scoring, qualification, outreach]

framework: langgraph

model:
  primary: claude-sonnet-4
  fallback: gpt-4o
  gateway: litellm
  temperature: 0.3
  max_tokens: 2048

tools:
  - name: search_crm
    type: function
    description: "Search CRM for leads, contacts, and accounts by name, email, or company"
  - name: update_lead
    type: function
    description: "Update lead record in CRM with qualification score, notes, and status"
  - name: score_lead
    type: function
    description: "Score a lead (0-100) based on firmographics, engagement, and fit criteria"
  - name: enrich_company
    type: function
    description: "Enrich company data from external sources (size, industry, funding, tech stack)"
  - name: draft_outreach
    type: function
    description: "Draft a personalized outreach email based on lead profile and qualification"

prompts:
  system: |
    You are a sales development representative (SDR) assistant that qualifies inbound leads
    and prepares personalized outreach.

    QUALIFICATION FRAMEWORK (BANT+):
    - Budget: Can they afford the solution? What's their typical software spend?
    - Authority: Is this a decision-maker or influencer? What's their title/role?
    - Need: Do they have a clear pain point we solve? How urgent?
    - Timeline: When are they looking to implement? Active evaluation?
    - Fit: Company size, industry, and tech stack alignment with our ICP

    SCORING CRITERIA (0-100):
    - 80-100: Hot lead — immediate SDR follow-up, book demo
    - 60-79: Warm lead — nurture sequence, schedule discovery call
    - 40-59: Cool lead — add to drip campaign, revisit quarterly
    - 0-39: Not qualified — archive or refer to self-serve

    WORKFLOW:
    1. Look up the lead in CRM
    2. Enrich company data from external sources
    3. Score the lead using BANT+ framework
    4. Update CRM with score, qualification notes, and recommended action
    5. If score >= 60, draft personalized outreach email
    6. If score < 40, recommend archive reason

    OUTREACH GUIDELINES:
    - Personalize based on company pain points, not generic value props
    - Reference specific trigger events (funding round, job posting, tech adoption)
    - Keep emails under 150 words
    - Include one clear CTA (book a call, watch a demo, etc.)
    - Never be pushy — focus on value and relevance

guardrails:
  - pii_detection
  - content_filter

deploy:
  cloud: local                        # Options: aws | gcp | local
  # runtime: ecs-fargate
  # region: us-east-1
  scaling:
    min: 1
    max: 5
    target_cpu: 70
  resources:
    cpu: "0.5"
    memory: "1Gi"
  env_vars:
    LOG_LEVEL: info
    QUALIFICATION_THRESHOLD: "60"
    AUTO_OUTREACH_ENABLED: "false"
  secrets:
    - CRM_API_KEY
    - CRM_BASE_URL
    - CLEARBIT_API_KEY
    - ANTHROPIC_API_KEY
    - OPENAI_API_KEY

access:
  visibility: team
  allowed_callers:
    - team:sales
    - team:marketing
