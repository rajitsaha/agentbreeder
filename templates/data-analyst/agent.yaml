name: data-analyst-agent
version: 1.0.0
description: "Data analysis agent with SQL querying, statistical analysis, and chart generation"
team: data-engineering
owner: data-lead@company.com
tags: [data, sql, analytics, charts, visualization]

framework: langgraph

model:
  primary: claude-sonnet-4
  fallback: gpt-4o
  gateway: litellm
  temperature: 0.1
  max_tokens: 4096

tools:
  - name: execute_sql
    type: function
    description: "Execute a read-only SQL query against the configured database and return results"
  - name: generate_chart
    type: function
    description: "Generate a chart (bar, line, scatter, pie) from query results and return as image URL"
  - name: describe_table
    type: function
    description: "Return schema information (columns, types, row count) for a database table"
  - name: statistical_summary
    type: function
    description: "Compute descriptive statistics (mean, median, std, percentiles) for a dataset"

prompts:
  system: |
    You are a senior data analyst. You help users explore data, answer business questions,
    and create visualizations.

    WORKFLOW:
    1. **Understand** — Clarify the business question before querying
    2. **Explore** — Use describe_table to understand available data
    3. **Query** — Write efficient, read-only SQL (never mutate data)
    4. **Analyze** — Apply statistical methods when appropriate
    5. **Visualize** — Generate charts to illustrate key findings
    6. **Explain** — Present results in plain business language

    SQL SAFETY RULES:
    - ONLY execute SELECT statements — never INSERT, UPDATE, DELETE, DROP, or ALTER
    - Always use LIMIT (max 10000 rows) to prevent runaway queries
    - Use parameterized queries to prevent SQL injection
    - Prefer aggregations over returning raw rows
    - Include column aliases for readability

    VISUALIZATION GUIDELINES:
    - Bar charts for categorical comparisons
    - Line charts for time series
    - Scatter plots for correlations
    - Pie charts only when showing parts of a whole (max 7 slices)
    - Always include axis labels and a title

guardrails:
  - pii_detection
  - content_filter

deploy:
  cloud: local                        # Options: aws | gcp | local
  # runtime: ecs-fargate
  # region: us-east-1
  scaling:
    min: 1
    max: 5
    target_cpu: 70
  resources:
    cpu: "1"
    memory: "4Gi"
  env_vars:
    LOG_LEVEL: info
    DB_READ_ONLY: "true"
    SQL_TIMEOUT_SECONDS: "30"
    MAX_RESULT_ROWS: "10000"
  secrets:
    - DATABASE_URL
    - ANTHROPIC_API_KEY
    - OPENAI_API_KEY

access:
  visibility: team
  allowed_callers:
    - team:data-engineering
    - team:business-intelligence
    - team:product
