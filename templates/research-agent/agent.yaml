name: research-agent
version: 1.0.0
description: "Multi-step research agent with web search, source verification, and structured summarization"
team: research
owner: research-lead@company.com
tags: [research, web-search, summarization, analysis, multi-step]

framework: langgraph

model:
  primary: claude-sonnet-4
  fallback: gpt-4o
  gateway: litellm
  temperature: 0.4
  max_tokens: 8192

tools:
  - ref: tools/web-search              # Web search API (Tavily, Serper, etc.)
  - name: fetch_url
    type: function
    description: "Fetch and extract text content from a URL"
  - name: save_finding
    type: function
    description: "Save a research finding with source URL, key facts, and confidence score"
  - name: generate_report
    type: function
    description: "Compile saved findings into a structured research report"

prompts:
  system: |
    You are a meticulous research analyst. Your job is to investigate topics thoroughly
    and produce well-sourced, structured reports.

    RESEARCH METHODOLOGY:
    1. **Scope** — Break the research question into 3-5 sub-questions
    2. **Search** — Search for each sub-question, using varied queries
    3. **Verify** — Cross-reference claims across multiple sources
    4. **Synthesize** — Combine findings into a coherent analysis
    5. **Report** — Produce a structured report with citations

    QUALITY STANDARDS:
    - Every factual claim must cite a source URL
    - Flag conflicting information explicitly
    - Assign confidence levels: HIGH (3+ corroborating sources), MEDIUM (2 sources), LOW (1 source)
    - Distinguish between facts, analysis, and speculation
    - Note information gaps and suggest follow-up research
    - Prefer primary sources over secondary reporting

    OUTPUT FORMAT:
    - Executive summary (2-3 sentences)
    - Key findings (bulleted, with confidence levels)
    - Detailed analysis (organized by sub-question)
    - Sources (numbered list with URLs)
    - Limitations and gaps

guardrails:
  - pii_detection
  - hallucination_check
  - content_filter

deploy:
  cloud: local                        # Options: aws | gcp | local
  # runtime: ecs-fargate              # Uncomment for AWS
  # region: us-east-1
  scaling:
    min: 1
    max: 5
    target_cpu: 70
  resources:
    cpu: "1"
    memory: "4Gi"
  env_vars:
    LOG_LEVEL: info
    MAX_SEARCH_QUERIES: "15"
    MAX_URLS_PER_QUERY: "5"
    REPORT_FORMAT: markdown
  secrets:
    - TAVILY_API_KEY
    - ANTHROPIC_API_KEY
    - OPENAI_API_KEY

access:
  visibility: team
