name: langgraph-starter-agent
version: 1.0.0
description: "LangGraph starter agent with tool-calling node and state management"
team: engineering
owner: dev@company.com
tags: [langgraph, starter, tools, graph]

framework: langgraph

model:
  primary: claude-sonnet-4
  fallback: gpt-4o
  gateway: litellm
  temperature: 0.5
  max_tokens: 2048

tools:
  - name: search
    type: function
    description: "Search for information on a topic"
  - name: calculator
    type: function
    description: "Evaluate a mathematical expression"

prompts:
  system: |
    You are a helpful assistant. Use your tools when appropriate to answer questions
    accurately. Always explain your reasoning.

guardrails:
  - pii_detection

deploy:
  cloud: local                        # Options: aws | gcp | local
  # runtime: ecs-fargate              # Uncomment for AWS
  # runtime: cloud-run                # Uncomment for GCP
  # region: us-east-1
  scaling:
    min: 1
    max: 5
    target_cpu: 70
  resources:
    cpu: "0.5"
    memory: "1Gi"
  env_vars:
    LOG_LEVEL: info
  secrets:
    - ANTHROPIC_API_KEY
    - OPENAI_API_KEY
