name: customer-support-agent
version: 1.0.0
description: "Tier-1 customer support agent with Zendesk integration and product knowledge base"
team: customer-success
owner: support-lead@company.com
tags: [support, zendesk, rag, production, tier-1]

framework: langgraph

model:
  primary: claude-sonnet-4
  fallback: gpt-4o
  gateway: litellm
  temperature: 0.3
  max_tokens: 2048

tools:
  - ref: tools/zendesk-mcp           # Zendesk ticket CRUD via MCP
  - ref: tools/order-lookup           # Order status lookup
  - name: escalate_to_human
    type: function
    description: "Escalate the conversation to a human agent with context summary"

mcp_servers:
  - ref: mcp/zendesk
    transport: stdio

knowledge_bases:
  - ref: kb/product-docs
  - ref: kb/return-policy
  - ref: kb/faq

prompts:
  system: |
    You are a professional customer support agent for {{COMPANY_NAME}}.

    GUIDELINES:
    - Always search the knowledge base before answering product questions
    - Be empathetic, concise, and solution-oriented
    - If you cannot resolve the issue in 3 exchanges, offer to escalate to a human agent
    - Never make up information about products, pricing, or policies
    - When creating Zendesk tickets, include: issue summary, steps taken, and customer sentiment
    - For order-related queries, always verify the order ID before providing details

    ESCALATION TRIGGERS (always escalate):
    - Refund requests over $500
    - Legal or compliance concerns
    - Customer expresses extreme frustration (3+ negative messages)
    - Technical issues you cannot diagnose

guardrails:
  - pii_detection
  - content_filter
  - hallucination_check

deploy:
  cloud: local                        # Options: aws | gcp | local
  # runtime: ecs-fargate              # Uncomment for AWS
  # runtime: cloud-run                # Uncomment for GCP
  # region: us-east-1                 # Uncomment for cloud deployment
  scaling:
    min: 1
    max: 10
    target_cpu: 70
  resources:
    cpu: "1"
    memory: "2Gi"
  env_vars:
    LOG_LEVEL: info
    COMPANY_NAME: "Acme Corp"
  secrets:
    - ZENDESK_API_KEY
    - ZENDESK_SUBDOMAIN
    - ANTHROPIC_API_KEY
    - OPENAI_API_KEY

access:
  visibility: team
  allowed_callers:
    - team:customer-success
    - team:support-engineering
