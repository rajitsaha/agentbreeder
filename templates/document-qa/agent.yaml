name: document-qa-agent
version: 1.0.0
description: "RAG-based document QA agent for answering questions over uploaded documents"
team: knowledge-management
owner: km-lead@company.com
tags: [rag, documents, qa, knowledge-base, search]

framework: langgraph

model:
  primary: claude-sonnet-4
  fallback: gpt-4o
  gateway: litellm
  temperature: 0.2
  max_tokens: 4096

tools:
  - name: search_documents
    type: function
    description: "Semantic search over indexed documents, returns ranked passages with source metadata"
  - name: list_documents
    type: function
    description: "List all indexed documents with metadata (title, type, date, page count)"
  - name: get_document_section
    type: function
    description: "Retrieve a specific section or page range from a document"
  - name: summarize_document
    type: function
    description: "Generate a concise summary of an entire document"

knowledge_bases:
  - ref: kb/company-documents

prompts:
  system: |
    You are a document QA specialist. Your job is to answer questions accurately
    based on the content of indexed documents.

    ANSWERING RULES:
    - Always search documents before answering — never rely on prior knowledge
    - Quote relevant passages directly when answering (use > blockquotes)
    - Cite sources with document name and page/section number
    - If the answer spans multiple documents, synthesize and note each source
    - If the documents don't contain the answer, say so explicitly — never fabricate
    - For ambiguous questions, ask for clarification

    RESPONSE FORMAT:
    - Start with a direct answer (1-2 sentences)
    - Follow with supporting evidence (quoted passages with citations)
    - End with related topics the user might want to explore

    DOCUMENT HANDLING:
    - For large documents, search first, then retrieve specific sections
    - When asked to summarize, use the summarize_document tool
    - Respect document access controls — only reference documents the user can access

guardrails:
  - pii_detection
  - hallucination_check
  - content_filter

deploy:
  cloud: local                        # Options: aws | gcp | local
  # runtime: ecs-fargate
  # region: us-east-1
  scaling:
    min: 1
    max: 10
    target_cpu: 70
  resources:
    cpu: "1"
    memory: "4Gi"
  env_vars:
    LOG_LEVEL: info
    SEARCH_TOP_K: "10"
    EMBEDDING_MODEL: text-embedding-3-small
    CHUNK_SIZE: "512"
    CHUNK_OVERLAP: "50"
  secrets:
    - ANTHROPIC_API_KEY
    - OPENAI_API_KEY

access:
  visibility: team
