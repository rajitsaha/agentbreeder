name: email-triage-agent
version: 1.0.0
description: "Email parsing, classification, and routing agent with priority scoring"
team: operations
owner: ops-lead@company.com
tags: [email, triage, classification, routing, automation]

framework: langgraph

model:
  primary: claude-sonnet-4
  fallback: gpt-4o
  gateway: litellm
  temperature: 0.2
  max_tokens: 2048

tools:
  - name: parse_email
    type: function
    description: "Parse email content, extracting sender, subject, body, attachments, and thread context"
  - name: classify_email
    type: function
    description: "Classify email into categories: support, sales, billing, partnership, spam, internal"
  - name: score_priority
    type: function
    description: "Score email priority (1-5) based on sender, content urgency, and SLA rules"
  - name: route_email
    type: function
    description: "Route email to the appropriate team queue with classification and priority"
  - name: generate_draft_reply
    type: function
    description: "Generate a draft reply based on email content and classification"

prompts:
  system: |
    You are an email triage agent that processes incoming emails, classifies them,
    and routes them to the right team.

    CLASSIFICATION CATEGORIES:
    - support: Customer issues, bugs, how-to questions
    - sales: Inquiries, demos, pricing, proposals
    - billing: Invoices, payment issues, refunds
    - partnership: Integration requests, partnership proposals
    - spam: Marketing, unsolicited outreach, phishing
    - internal: Employee requests, internal communications

    PRIORITY SCORING (1-5):
    - 5 (Critical): Service outage, security incident, executive sender
    - 4 (High): Revenue-impacting, SLA breach risk, VIP customer
    - 3 (Medium): Standard support/sales request with deadline
    - 2 (Low): General inquiry, no urgency
    - 1 (Minimal): Newsletter, FYI, non-actionable

    ROUTING RULES:
    - Always classify before routing
    - Spam emails: mark as spam, do not route
    - Priority 5: route AND send Slack alert to on-call
    - Auto-draft replies for priority <= 3 standard requests
    - Flag emails with attachments > 10MB for manual review
    - Thread-aware: check for existing conversation context

guardrails:
  - pii_detection
  - content_filter

deploy:
  cloud: local                        # Options: aws | gcp | local
  # runtime: ecs-fargate
  # region: us-east-1
  scaling:
    min: 1
    max: 10
    target_cpu: 70
  resources:
    cpu: "0.5"
    memory: "1Gi"
  env_vars:
    LOG_LEVEL: info
    AUTO_REPLY_ENABLED: "true"
    AUTO_REPLY_MAX_PRIORITY: "3"
  secrets:
    - IMAP_HOST
    - IMAP_USER
    - IMAP_PASSWORD
    - SMTP_HOST
    - SMTP_USER
    - SMTP_PASSWORD
    - ANTHROPIC_API_KEY
    - OPENAI_API_KEY

access:
  visibility: team
  allowed_callers:
    - team:operations
    - team:customer-success
