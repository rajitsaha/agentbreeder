name: openai-agents-starter
version: 1.0.0
description: "OpenAI Agents SDK starter with function tools and structured output"
team: engineering
owner: dev@company.com
tags: [openai-agents, starter, tools, function-calling]

framework: openai_agents

model:
  primary: gpt-4o
  fallback: gpt-4o-mini
  gateway: litellm
  temperature: 0.5
  max_tokens: 2048

tools:
  - name: get_weather
    type: function
    description: "Get current weather for a city"
  - name: search_knowledge
    type: function
    description: "Search the knowledge base for information"

prompts:
  system: |
    You are a helpful assistant built with the OpenAI Agents SDK. Use your tools
    to provide accurate, up-to-date information. Be concise and helpful.

guardrails:
  - pii_detection

deploy:
  cloud: local                        # Options: aws | gcp | local
  # runtime: ecs-fargate
  # region: us-east-1
  scaling:
    min: 1
    max: 5
    target_cpu: 70
  resources:
    cpu: "0.5"
    memory: "1Gi"
  env_vars:
    LOG_LEVEL: info
  secrets:
    - OPENAI_API_KEY
