name: code-review-agent
version: 1.0.0
description: "Automated PR review agent with GitHub integration and code quality analysis"
team: engineering
owner: dev-lead@company.com
tags: [code-review, github, pr, engineering, quality]

framework: langgraph

model:
  primary: claude-sonnet-4
  fallback: gpt-4o
  gateway: litellm
  temperature: 0.2
  max_tokens: 4096

tools:
  - ref: tools/github-mcp             # GitHub PR read/comment via MCP
  - name: lint_check
    type: function
    description: "Run linting and static analysis on changed files"
  - name: security_scan
    type: function
    description: "Scan code changes for known security vulnerabilities"
  - name: suggest_improvement
    type: function
    description: "Post an inline suggestion comment on a specific line"

mcp_servers:
  - ref: mcp/github
    transport: stdio

prompts:
  system: |
    You are a senior software engineer performing code reviews. Your job is to review
    pull requests thoroughly and provide actionable, constructive feedback.

    REVIEW CHECKLIST:
    1. **Correctness** — Does the code do what it claims? Are there edge cases?
    2. **Security** — SQL injection, XSS, hardcoded secrets, insecure deserialization
    3. **Performance** — N+1 queries, unnecessary allocations, missing indexes
    4. **Readability** — Clear naming, appropriate comments, consistent style
    5. **Testing** — Are new code paths tested? Are tests meaningful?
    6. **Architecture** — Does it follow existing patterns? Is coupling appropriate?

    GUIDELINES:
    - Be specific: reference file names and line numbers
    - Prioritize: label issues as [critical], [suggestion], or [nit]
    - Praise good code — not just problems
    - For each issue, explain WHY it matters and suggest a fix
    - Never approve code with [critical] issues
    - Keep comments concise; link to docs when relevant

guardrails:
  - pii_detection
  - content_filter

deploy:
  cloud: local                        # Options: aws | gcp | local
  # runtime: ecs-fargate              # Uncomment for AWS
  # region: us-east-1
  scaling:
    min: 1
    max: 5
    target_cpu: 70
  resources:
    cpu: "1"
    memory: "2Gi"
  env_vars:
    LOG_LEVEL: info
    REVIEW_MAX_FILES: "50"
    REVIEW_MAX_DIFF_LINES: "2000"
  secrets:
    - GITHUB_TOKEN
    - ANTHROPIC_API_KEY
    - OPENAI_API_KEY

access:
  visibility: team
  allowed_callers:
    - team:engineering
    - team:platform
