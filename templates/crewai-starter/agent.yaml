name: crewai-starter-agent
version: 1.0.0
description: "CrewAI starter with researcher and writer agents in a sequential crew"
team: engineering
owner: dev@company.com
tags: [crewai, starter, crew, multi-agent]

framework: crewai

model:
  primary: claude-sonnet-4
  fallback: gpt-4o
  gateway: litellm
  temperature: 0.5
  max_tokens: 4096

tools:
  - name: search
    type: function
    description: "Search the web for information"
  - name: write_file
    type: function
    description: "Write content to a file"

prompts:
  system: |
    You coordinate a crew of AI agents. The researcher finds information and the
    writer produces polished content based on research findings.

guardrails:
  - pii_detection

deploy:
  cloud: local                        # Options: aws | gcp | local
  # runtime: ecs-fargate
  # region: us-east-1
  scaling:
    min: 1
    max: 5
    target_cpu: 70
  resources:
    cpu: "1"
    memory: "2Gi"
  env_vars:
    LOG_LEVEL: info
  secrets:
    - ANTHROPIC_API_KEY
    - OPENAI_API_KEY
