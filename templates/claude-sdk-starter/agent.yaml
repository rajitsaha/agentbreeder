name: claude-sdk-starter
version: 1.0.0
description: "Claude SDK starter agent with tool use and streaming responses"
team: engineering
owner: dev@company.com
tags: [claude, anthropic, starter, tools, streaming]

framework: claude_sdk

model:
  primary: claude-sonnet-4
  fallback: claude-haiku-3
  temperature: 0.5
  max_tokens: 2048

tools:
  - name: get_time
    type: function
    description: "Get the current time in a specified timezone"
  - name: lookup_info
    type: function
    description: "Look up information from the knowledge base"

prompts:
  system: |
    You are a helpful assistant built with the Claude SDK. Use your tools when
    appropriate. Be thoughtful, accurate, and concise in your responses.
    When using tools, explain what you're doing and why.

guardrails:
  - pii_detection

deploy:
  cloud: local                        # Options: aws | gcp | local
  # runtime: ecs-fargate
  # region: us-east-1
  scaling:
    min: 1
    max: 5
    target_cpu: 70
  resources:
    cpu: "0.5"
    memory: "1Gi"
  env_vars:
    LOG_LEVEL: info
  secrets:
    - ANTHROPIC_API_KEY
