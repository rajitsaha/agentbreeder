<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, system-ui, sans-serif">
  <!-- background -->
  <rect width="1200" height="630" fill="#0a0a0a"/>

  <!-- subtle grid for depth -->
  <g opacity="0.05" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
  </g>

  <!-- accent dot -->
  <circle cx="80" cy="115" r="6" fill="#fb923c"/>

  <!-- brand mark -->
  <text x="105" y="128" font-size="42" font-weight="700" fill="#fb923c" letter-spacing="-1">AgentBreeder</text>
  <text x="455" y="115" font-size="22" font-weight="500" fill="#71717a">™</text>

  <!-- main headline -->
  <text x="80" y="270" font-size="68" font-weight="700" fill="#ffffff" letter-spacing="-2">The only agent platform</text>
  <text x="80" y="350" font-size="68" font-weight="700" fill="#ffffff" letter-spacing="-2">that doesn't pick a winner.</text>

  <!-- framework chips -->
  <g transform="translate(80, 420)">
    <rect x="0" y="0" rx="10" width="140" height="46" fill="#18181b" stroke="#3f3f46" stroke-width="1"/>
    <text x="70" y="30" font-size="20" font-weight="500" fill="#e4e4e7" text-anchor="middle">LangGraph</text>

    <rect x="155" y="0" rx="10" width="180" height="46" fill="#18181b" stroke="#3f3f46" stroke-width="1"/>
    <text x="245" y="30" font-size="20" font-weight="500" fill="#e4e4e7" text-anchor="middle">OpenAI Agents</text>

    <rect x="350" y="0" rx="10" width="145" height="46" fill="#18181b" stroke="#3f3f46" stroke-width="1"/>
    <text x="422" y="30" font-size="20" font-weight="500" fill="#e4e4e7" text-anchor="middle">Claude SDK</text>

    <rect x="510" y="0" rx="10" width="155" height="46" fill="#18181b" stroke="#3f3f46" stroke-width="1"/>
    <text x="587" y="30" font-size="20" font-weight="500" fill="#e4e4e7" text-anchor="middle">Google ADK</text>

    <rect x="680" y="0" rx="10" width="105" height="46" fill="#18181b" stroke="#3f3f46" stroke-width="1"/>
    <text x="732" y="30" font-size="20" font-weight="500" fill="#e4e4e7" text-anchor="middle">CrewAI</text>
  </g>

  <!-- × clouds row -->
  <text x="80" y="510" font-size="22" font-weight="600" fill="#fb923c" letter-spacing="2">×</text>
  <text x="105" y="510" font-size="20" font-weight="500" fill="#a1a1aa" letter-spacing="3">LOCAL · GCP · AWS · AZURE</text>

  <!-- footer divider -->
  <line x1="80" y1="555" x2="1120" y2="555" stroke="#27272a" stroke-width="1"/>

  <!-- footer -->
  <text x="80" y="595" font-size="20" font-weight="500" fill="#a1a1aa">Apache 2.0 · open source</text>
  <text x="1120" y="595" font-size="20" font-weight="500" fill="#a1a1aa" text-anchor="end">github.com/agentbreeder/agentbreeder</text>
</svg>
