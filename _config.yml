# Jekyll config — only used if GitHub Pages falls back to Jekyll processing.
# The actual docs site is built by MkDocs via .github/workflows/docs.yml.

exclude:
  - "CLAUDE.md"
  - "AGENTS.md"
  - "CONTRIBUTING.md"
  - "ARCHITECTURE.md"
  - "SECURITY.md"
  - "ROADMAP.md"
  - "docs/superpowers/"
  - "venv/"
  - "dist/"
  - "*.egg-info/"
  - "node_modules/"
  - ".worktrees/"

# Prevent Liquid from processing code blocks that look like template syntax
liquid:
  error_mode: warn
