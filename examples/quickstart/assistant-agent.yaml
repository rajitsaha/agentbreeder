name: assistant
version: 1.0.0
description: "General-purpose conversational assistant. Talks directly to the configured LLM — no tools required. Great starting point."
team: quickstart
owner: quickstart@agentbreeder.io
tags: [assistant, chat, demo, getting-started]

model:
  primary: ollama/llama3.2
  fallback: claude-haiku-4
  temperature: 0.7
  max_tokens: 2048
  gateway: litellm

framework: langgraph

prompts:
  system: |
    You are a helpful, friendly AI assistant powered by AgentBreeder.
    You can answer general questions, help with writing, coding, analysis, and more.
    When users ask about AgentBreeder specifically, explain that this assistant was
    deployed in minutes using `agentbreeder quickstart`.

guardrails:
  - content_filter

deploy:
  cloud: local
  runtime: docker-compose
  resources:
    cpu: "0.25"
    memory: "256Mi"

access:
  visibility: public
