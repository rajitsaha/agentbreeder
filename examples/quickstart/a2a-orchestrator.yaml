name: a2a-orchestrator
version: 1.0.0
description: "Master orchestrator that routes questions to specialized sub-agents (rag-agent, graph-agent, search-agent) via Agent-to-Agent protocol."
team: quickstart
owner: quickstart@agentbreeder.io
tags: [a2a, orchestration, multi-agent, demo]

model:
  primary: ollama/llama3.2
  fallback: claude-haiku-4
  gateway: litellm

framework: langgraph

tools:
  - name: call_rag_agent
    type: a2a
    description: "Call the RAG agent to search the knowledge base for factual questions about AgentBreeder"
    agent: rag-agent
    protocol: a2a

  - name: call_graph_agent
    type: a2a
    description: "Call the graph agent to answer relationship questions about agents, tools, and providers"
    agent: graph-agent
    protocol: a2a

  - name: call_search_agent
    type: a2a
    description: "Call the search agent for questions that require filesystem access or web research"
    agent: search-agent
    protocol: a2a

prompts:
  system: |
    You are an intelligent orchestrator that routes questions to the right specialist:

    - rag-agent: factual questions about AgentBreeder features, configuration, deployment
    - graph-agent: relationship questions ("which agents use X?", "how are Y and Z connected?")
    - search-agent: questions requiring current web info or file access

    For complex questions, call multiple agents and synthesize their answers.
    Always tell the user which agent(s) you're consulting.

guardrails:
  - content_filter

deploy:
  cloud: local
  runtime: docker-compose
  resources:
    cpu: "0.5"
    memory: "512Mi"

access:
  visibility: team
  allowed_callers:
    - team:quickstart
