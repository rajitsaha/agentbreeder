name: search-agent
version: 1.0.0
description: "A web-aware agent with access to the MCP filesystem server and memory. Demo agent seeded by agentbreeder quickstart."
team: quickstart
owner: quickstart@agentbreeder.io
tags: [search, mcp, filesystem, demo]

model:
  primary: ollama/llama3.2
  fallback: gpt-4o-mini
  gateway: litellm

framework: langgraph

tools:
  - ref: tools/mcp-filesystem
  - ref: tools/mcp-memory
  - name: web_search
    type: function
    description: "Search the web for current information"
    schema:
      type: object
      properties:
        query:
          type: string
          description: "Search query"
        max_results:
          type: integer
          default: 5
      required: [query]

prompts:
  system: |
    You are a research assistant with access to:
    - The local filesystem (via MCP) for reading files and documents
    - Persistent memory (via MCP) to remember information across conversations
    - Web search to find current information

    Use these tools proactively to give thorough, well-researched answers.
    Always save important information to memory for future reference.

guardrails:
  - content_filter
  - pii_detection

deploy:
  cloud: local
  runtime: docker-compose
  resources:
    cpu: "0.5"
    memory: "512Mi"
