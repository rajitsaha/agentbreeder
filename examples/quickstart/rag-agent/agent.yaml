name: rag-agent
version: 1.0.0
description: "Answers questions using vector search over a ChromaDB knowledge base. Demo agent seeded by agentbreeder quickstart."
team: quickstart
owner: quickstart@agentbreeder.io
tags: [rag, vector-search, chromadb, demo]

model:
  primary: ollama/llama3.2
  fallback: claude-haiku-4
  gateway: litellm

framework: langgraph

tools:
  - name: rag_search
    type: function
    description: "Search the AgentBreeder knowledge base using semantic vector search"
    schema:
      type: object
      properties:
        query:
          type: string
          description: "The question or topic to search for"
        n_results:
          type: integer
          description: "Number of results to return (default 3)"
          default: 3
      required: [query]

knowledge_bases:
  - ref: kb/agentbreeder-knowledge

prompts:
  system: |
    You are a helpful AI assistant with access to the AgentBreeder knowledge base.
    Use the rag_search tool to find relevant information before answering questions.
    Always cite the source documents you used. Be concise and accurate.

guardrails:
  - content_filter
  - hallucination_check

deploy:
  cloud: local
  runtime: docker-compose
  resources:
    cpu: "0.5"
    memory: "512Mi"
  env_vars:
    CHROMADB_URL: http://chromadb:8000
    COLLECTION_NAME: agentbreeder_knowledge
