name: graph-agent
version: 1.0.0
description: "Answers questions by querying a Neo4j knowledge graph of agents, tools, and providers. Demo agent seeded by agentbreeder quickstart."
team: quickstart
owner: quickstart@agentbreeder.io
tags: [graphrag, neo4j, knowledge-graph, demo]

model:
  primary: ollama/llama3.2
  fallback: claude-haiku-4
  gateway: litellm

framework: langgraph

tools:
  - name: graph_query
    type: function
    description: "Query the Neo4j knowledge graph using natural language. Converts to Cypher and returns results."
    schema:
      type: object
      properties:
        question:
          type: string
          description: "Natural language question about agents, tools, providers, or their relationships"
      required: [question]

prompts:
  system: |
    You are a graph intelligence assistant connected to a Neo4j knowledge graph
    that contains information about AI agents, their tools, frameworks, and providers.

    Use the graph_query tool to answer questions about relationships:
    - "Which agents use Claude?"
    - "What tools does the RAG agent use?"
    - "Which frameworks support tool calling?"
    - "Show me all agents in the quickstart team"

    Be precise and use the graph data to support your answers.

guardrails:
  - content_filter

deploy:
  cloud: local
  runtime: docker-compose
  resources:
    cpu: "0.5"
    memory: "512Mi"
  env_vars:
    NEO4J_URL: bolt://neo4j:7687
    NEO4J_USER: neo4j
    NEO4J_PASSWORD: agentbreeder
