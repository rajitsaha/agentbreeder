name: claude-managed-example-agent
version: 1.0.0
description: "Example agent deployed to Anthropic Claude Managed Agents — no container build required."
team: examples
owner: dev@agentbreeder.com
tags: [example, anthropic, claude-managed, serverless]

framework: claude_sdk

model:
  primary: claude-sonnet-4-6

deploy:
  cloud: claude-managed
  # No region, scaling, or resources needed — Anthropic manages the runtime.
  env_vars: {}
  secrets:
    - ANTHROPIC_API_KEY

# Claude Managed Agents configuration block
claude_managed:
  environment:
    networking: unrestricted        # unrestricted | restricted
  tools:
    - type: agent_toolset_20260401  # Full built-in toolset (default)

# System prompt for the managed agent
# (resolved from registry if using a ref, or inline string below)
prompts:
  system: >
    You are a helpful AI assistant deployed via AgentBreeder to Anthropic's
    managed infrastructure. You have access to built-in tools and can help
    users with a wide range of tasks.

access:
  visibility: team
  require_approval: false
