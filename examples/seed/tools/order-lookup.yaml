# Seed tool — referenced by examples/seed/agents/customer-support.yaml
# Loaded by engine/seed/first_boot.py when the tools table is empty.

spec_version: v1
name: order-lookup
version: 1.0.0
description: "Look up an order by order ID. Returns status, line items, shipment ETA."
team: customer-success
owner: demo@agentbreeder.com
tags: [orders, lookup, seed, starter]

type: api

input_schema:
  type: object
  required: [order_id]
  properties:
    order_id:
      type: string
      description: "Order ID, e.g. ORD-12345."

output_schema:
  type: object
  properties:
    order_id: { type: string }
    status:
      type: string
      enum: [pending, paid, shipped, delivered, cancelled]
    items:
      type: array
      items:
        type: object
        properties:
          sku: { type: string }
          qty: { type: integer }
    eta: { type: string, format: date }

implementation:
  language: python
  entrypoint: handler.py:run
  dependencies:
    - httpx>=0.27

timeout_seconds: 15
network_access: true
