name: app-runner-example-agent
version: 1.0.0
description: "Example agent deployed to AWS App Runner — serverless containers, no VPC/ALB required."
team: examples
owner: dev@agentbreeder.com
tags: [example, aws, app-runner, serverless]

framework: langgraph

model:
  primary: claude-sonnet-4-6
  fallback: gpt-4o-mini
  temperature: 0.7
  max_tokens: 4096

deploy:
  cloud: aws
  runtime: app-runner
  region: us-east-1
  scaling:
    min: 1
    max: 5
    target_cpu: 70
  resources:
    cpu: "1"
    memory: "2Gi"
  env_vars:
    AWS_ACCOUNT_ID: "123456789012"      # Replace with your AWS account ID
    AWS_REGION: us-east-1
    AWS_ECR_REPO: agentbreeder          # Optional — defaults to agent name
    # AWS_APP_RUNNER_ACCESS_ROLE_ARN: arn:aws:iam::123456789012:role/AppRunnerECRAccess
    LOG_LEVEL: info
    ENVIRONMENT: production
  secrets:
    - ANTHROPIC_API_KEY

access:
  visibility: team
  require_approval: false
