# Minimal docker-compose example showing the sidecar pattern.
#
# The agent listens on :8081 (sidecar-aware port) and the sidecar fronts it on
# :8080. External traffic must hit :8080 with a valid bearer token.
#
# Run:
#   AGENT_AUTH_TOKEN=$(openssl rand -hex 16) docker compose up
#
# Then probe:
#   curl http://localhost:8080/health
#   curl -H "Authorization: Bearer $AGENT_AUTH_TOKEN" http://localhost:8080/invoke

services:
  sidecar:
    image: rajits/agentbreeder-sidecar:latest
    environment:
      AGENT_NAME: demo-agent
      AGENT_AUTH_TOKEN: ${AGENT_AUTH_TOKEN}
      AGENTBREEDER_SIDECAR_AGENT_URL: http://agent:8081
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      AGENTBREEDER_API_URL: ${AGENTBREEDER_API_URL:-}
      AGENTBREEDER_API_TOKEN: ${AGENTBREEDER_API_TOKEN:-}
    ports:
      - "8080:8080"
    volumes:
      - ./sidecar.yaml:/etc/agentbreeder/sidecar.yaml:ro
    depends_on:
      - agent

  agent:
    # Replace with your runtime image. Must:
    #  - listen on :8081 when AGENTBREEDER_SIDECAR_PORT=8081 is set;
    #  - validate AGENT_AUTH_TOKEN itself (defence in depth).
    image: rajits/agentbreeder-runtime-langgraph:latest
    environment:
      AGENT_NAME: demo-agent
      AGENT_AUTH_TOKEN: ${AGENT_AUTH_TOKEN}
      AGENTBREEDER_SIDECAR_PORT: "8081"
    expose:
      - "8081"
