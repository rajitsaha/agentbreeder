agent_name: demo-agent
agent_version: 1.0.0

# User-supplied guardrails run AFTER the built-in PII rules.
guardrails:
  - name: no-internal-urls
    type: regex
    pattern: 'https?://(?:internal|private)\.[A-Za-z0-9.-]+'
    action: block
  - name: profanity
    type: keyword
    pattern: "darn,heck"
    action: redact
    replace: "[CENSORED]"

# Map of A2A peer name → URL. Use `peer-token@@<url>` for per-peer auth.
a2a_peers:
  research-agent: http://research-agent:8080

# Map of MCP server name → spec.
mcp_servers:
  docs:
    transport: http
    url: https://docs.example.com/mcp
