name: weather-assistant
version: 1.0.0
description: "A Claude SDK agent that answers weather questions using tool use."
team: platform
owner: eng@example.com
tags: [claude, sdk, weather, example]

model:
  primary: claude-sonnet-4-6
  temperature: 0.3
  max_tokens: 1024

framework: claude_sdk

deploy:
  cloud: local
  env_vars:
    LOG_LEVEL: info
    AGENT_MODEL: claude-sonnet-4-6
    AGENT_SYSTEM_PROMPT: "You are a helpful weather assistant. Use the get_weather tool to answer questions."
  secrets:
    - ANTHROPIC_API_KEY

access:
  visibility: team
