name: Release

on:
  push:
    tags:
      - "v*.*.*"   # triggers on v1.2.3, v0.1.0, etc.

permissions:
  contents: write   # to create GitHub Releases
  packages: write   # to push to GHCR

jobs:
  # ── Run all checks before releasing ─────────────────────────────────────────
  pre-release-check:
    name: Pre-release Checks
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: agentbreeder
          POSTGRES_PASSWORD: agentbreeder
          POSTGRES_DB: agentbreeder_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check . && ruff format --check .

      - name: Run unit tests
        env:
          DATABASE_URL: postgresql+asyncpg://agentbreeder:agentbreeder@localhost:5432/agentbreeder_test
          REDIS_URL: redis://localhost:6379
          SECRET_KEY: test-secret-key-for-ci
          GARDEN_ENV: test
          JWT_SECRET_KEY: test-jwt-secret-for-ci
        run: pytest tests/unit/ -v

  # ── Build SDK package ───────────────────────────────────────────────────────
  build-sdk:
    name: Build SDK Package
    runs-on: ubuntu-latest
    needs: pre-release-check
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # hatch-vcs needs full tag history
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build SDK wheel and sdist
        run: |
          pip install build
          cd sdk/python && python -m build
      - name: Verify SDK package
        run: |
          pip install twine
          twine check sdk/python/dist/*
      - name: Upload SDK build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sdk-dist
          path: sdk/python/dist/

  # ── Build Python package ─────────────────────────────────────────────────────
  build-python:
    name: Build Python Package
    runs-on: ubuntu-latest
    needs: pre-release-check
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # hatch-vcs needs full tag history

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheel and sdist
        run: |
          pip install build
          python -m build

      - name: Verify package
        run: |
          pip install twine
          twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/

  # ── Build and push container images ─────────────────────────────────────────
  build-images:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: pre-release-check
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository }}/api:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository }}/api:latest
            rajits/agentbreeder-api:${{ steps.version.outputs.version }}
            rajits/agentbreeder-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Dashboard image
        uses: docker/build-push-action@v6
        with:
          context: ./dashboard
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository }}/dashboard:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository }}/dashboard:latest
            rajits/agentbreeder-dashboard:${{ steps.version.outputs.version }}
            rajits/agentbreeder-dashboard:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push CLI image
        uses: docker/build-push-action@v6
        with:
          file: ./Dockerfile.cli
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            rajits/agentbreeder-cli:${{ steps.version.outputs.version }}
            rajits/agentbreeder-cli:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Build TypeScript SDK ────────────────────────────────────────────────────
  build-ts-sdk:
    name: Build TypeScript SDK
    runs-on: ubuntu-latest
    needs: pre-release-check
    defaults:
      run:
        working-directory: sdk/typescript
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm run build

      - name: Upload TS SDK build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ts-sdk-dist
          path: sdk/typescript/dist/

  # ── Create GitHub Release ────────────────────────────────────────────────────
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [build-python, build-sdk, build-ts-sdk, build-images]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Extract section between this version and the previous one
          NOTES=$(awk "/^## \[${VERSION}\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md || echo "See CHANGELOG.md for details.")
          # Export as multiline
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "notes<<$EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      - name: Download Python dist
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "AgentBreeder v${{ steps.version.outputs.version }}"
          body: ${{ steps.changelog.outputs.notes }}
          files: dist/*
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}

  # ── Publish SDK to PyPI ─────────────────────────────────────────────────────
  publish-sdk-pypi:
    name: Publish SDK to PyPI
    runs-on: ubuntu-latest
    needs: github-release
    environment:
      name: pypi
      url: https://pypi.org/project/agentbreeder-sdk/
    permissions:
      id-token: write
    steps:
      - name: Download SDK dist
        uses: actions/download-artifact@v4
        with:
          name: sdk-dist
          path: dist/
      - name: Publish SDK to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  # ── Publish to PyPI ──────────────────────────────────────────────────────────
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [github-release, publish-sdk-pypi]
    environment:
      name: pypi
      url: https://pypi.org/project/agentbreeder/
    permissions:
      id-token: write   # OIDC trusted publishing — no API key needed
    steps:
      - name: Download Python dist
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  # ── Publish TypeScript SDK to npm ───────────────────────────────────────────
  publish-npm:
    name: Publish @agentbreeder/sdk to npm
    runs-on: ubuntu-latest
    needs: github-release
    defaults:
      run:
        working-directory: sdk/typescript
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm run build

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          npm version "$VERSION" --no-git-tag-version

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Publish to npm
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          npm publish --access public 2>&1 | tee /tmp/npm-publish.log; publish_exit=${PIPESTATUS[0]}
          if [ $publish_exit -ne 0 ]; then
            if grep -q "You cannot publish over" /tmp/npm-publish.log; then
              echo "Version ${VERSION} already published on npm, skipping."
            else
              cat /tmp/npm-publish.log
              exit $publish_exit
            fi
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── Update Homebrew tap ──────────────────────────────────────────────────────
  update-homebrew:
    name: Update Homebrew Tap
    runs-on: ubuntu-latest
    needs: publish-pypi
    steps:
      - name: Wait for PyPI propagation
        run: sleep 60

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Checkout homebrew tap
        uses: actions/checkout@v4
        with:
          repository: rajitsaha/homebrew-agentbreeder
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula from PyPI
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          python3 << 'PYEOF'
          import os, re, json, urllib.request

          version = os.environ["VERSION"]

          def pypi_sdist(pkg, ver):
              url = f"https://pypi.org/pypi/{pkg}/{ver}/json"
              with urllib.request.urlopen(url) as r:
                  data = json.loads(r.read())
              for f in data["urls"]:
                  if f["packagetype"] == "sdist":
                      return f["url"], f["digests"]["sha256"]
              raise ValueError(f"no sdist found for {pkg} {ver}")

          ab_url,  ab_sha  = pypi_sdist("agentbreeder",     version)
          sdk_url, sdk_sha = pypi_sdist("agentbreeder-sdk", version)

          formula_path = "homebrew-tap/Formula/agentbreeder.rb"
          with open(formula_path) as f:
              text = f.read()

          # Update main package url + sha256 (2-space indent, first block)
          text = re.sub(
              r'(  url )"https://files\.pythonhosted\.org/[^"]+agentbreeder-\d[^"]*\.tar\.gz"(\n  sha256 )"[a-f0-9]{64}"',
              rf'\1"{ab_url}"\2"{ab_sha}"', text)

          # Update SDK resource url + sha256 (4-space indent, inside resource block)
          text = re.sub(
              r'(    url )"https://files\.pythonhosted\.org/[^"]+agentbreeder[_-]sdk[^"]*\.tar\.gz"(\n    sha256 )"[a-f0-9]{64}"',
              rf'\1"{sdk_url}"\2"{sdk_sha}"', text)

          with open(formula_path, "w") as f:
              f.write(text)

          print(f"Updated formula to v{version}")
          print(f"  agentbreeder:     {ab_url}")
          print(f"  agentbreeder-sdk: {sdk_url}")
          PYEOF

      - name: Commit and push
        run: |
          cd homebrew-tap
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add Formula/agentbreeder.rb
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "agentbreeder ${{ steps.version.outputs.version }}" && git push
