name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install ruff mypy types-redis types-PyYAML pydantic

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy type check
        run: mypy api/ engine/ cli/ registry/ connectors/ --ignore-missing-imports

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npx tsc -b --noEmit

  test-python:
    name: Python Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: agentbreeder
          POSTGRES_PASSWORD: agentbreeder
          POSTGRES_DB: agentbreeder_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Configure git identity for tests
        run: |
          git config --global user.email "ci@agentbreeder.dev"
          git config --global user.name "AgentBreeder CI"

      - name: Run unit tests with coverage
        env:
          DATABASE_URL: postgresql+asyncpg://agentbreeder:agentbreeder@localhost:5432/agentbreeder_test
          REDIS_URL: redis://localhost:6379
          SECRET_KEY: test-secret-key-for-ci
          GARDEN_ENV: test
          JWT_SECRET_KEY: test-jwt-secret-for-ci
        run: |
          pytest tests/unit/ \
            --cov=api --cov=engine --cov=cli --cov=registry --cov=connectors \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --junitxml=test-results.xml

      - name: Upload coverage to Codecov
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_on_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Enforce coverage threshold
        run: |
          coverage report --fail-under=75

  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [lint-python, lint-frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install Python dependencies
        run: pip install -e ".[dev]"

      - name: Install frontend dependencies
        working-directory: dashboard
        run: npm ci

      - name: Install Playwright browsers
        working-directory: dashboard
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        working-directory: dashboard
        run: npm run build

      - name: Run E2E tests
        working-directory: dashboard
        env:
          GARDEN_ENV: test
        run: npx playwright test

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: dashboard/playwright-report/
          retention-days: 7

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test-python]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build SDK package
        run: |
          pip install build
          cd sdk/python && python -m build

      - name: Build CLI package
        run: |
          pip install build
          python -m build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: agentbreeder-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Dashboard image
        uses: docker/build-push-action@v6
        with:
          context: ./dashboard
          push: false
          tags: agentbreeder-dashboard:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build CLI image
        uses: docker/build-push-action@v6
        with:
          file: ./Dockerfile.cli
          push: false
          tags: agentbreeder-cli:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
