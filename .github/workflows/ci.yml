name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install ruff mypy types-redis types-PyYAML pydantic fastapi starlette

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy type check
        run: mypy api/ engine/ cli/ registry/ connectors/ --ignore-missing-imports

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npx tsc -b --noEmit

  test-python:
    name: Python ${{ matrix.python-version }} Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: agentbreeder
          POSTGRES_PASSWORD: agentbreeder
          POSTGRES_DB: agentbreeder_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Configure git identity for tests
        run: |
          git config --global user.email "ci@agentbreeder.dev"
          git config --global user.name "AgentBreeder CI"

      - name: Run unit tests with coverage
        env:
          DATABASE_URL: postgresql+asyncpg://agentbreeder:agentbreeder@localhost:5432/agentbreeder_test
          REDIS_URL: redis://localhost:6379
          SECRET_KEY: test-secret-key-for-ci
          GARDEN_ENV: test
          JWT_SECRET_KEY: test-jwt-secret-for-ci
        run: |
          pytest tests/unit/ \
            --cov=api --cov=engine --cov=cli --cov=registry --cov=connectors \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --junitxml=test-results.xml

      - name: Upload coverage to Codecov
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Enforce coverage threshold
        run: |
          coverage report --fail-under=75

  # ── Mocked E2E (fast, no backend needed) ────────────────────────────────────
  test-e2e-mocked:
    name: E2E Tests (Mocked)
    runs-on: ubuntu-latest
    needs: [lint-python, lint-frontend]
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run mocked E2E tests
        run: npx playwright test --config=playwright.config.ts

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-mocked-report
          path: dashboard/playwright-report/
          retention-days: 7

  # ── Docker E2E (real stack) ──────────────────────────────────────────────────
  test-e2e-docker:
    name: E2E Tests (Docker)
    runs-on: ubuntu-latest
    needs: [test-python]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        run: |
          docker build -t agentbreeder-api:e2e . 2>&1 | tail -5

      - name: Build Dashboard image
        run: |
          docker build -t agentbreeder-dashboard:e2e ./dashboard 2>&1 | tail -5

      - name: Start DB and cache
        run: |
          IMAGE_API=agentbreeder-api:e2e \
          IMAGE_DASHBOARD=agentbreeder-dashboard:e2e \
          docker compose \
            -f deploy/docker-compose.yml \
            -f deploy/docker-compose.e2e.yml \
            -p e2e \
            up -d --wait \
            postgres redis
        timeout-minutes: 3

      - name: Run migrations
        run: |
          IMAGE_API=agentbreeder-api:e2e \
          docker compose \
            -f deploy/docker-compose.yml \
            -f deploy/docker-compose.e2e.yml \
            -p e2e \
            run --rm migrate
        timeout-minutes: 2

      - name: Start API and dashboard
        run: |
          IMAGE_API=agentbreeder-api:e2e \
          IMAGE_DASHBOARD=agentbreeder-dashboard:e2e \
          docker compose \
            -f deploy/docker-compose.yml \
            -f deploy/docker-compose.e2e.yml \
            -p e2e \
            up -d --wait \
            api dashboard
        timeout-minutes: 3

      - name: Wait for API health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health; then
              echo "API is healthy"
              break
            fi
            echo "Attempt $i/30 — waiting..."
            sleep 5
          done
          curl -sf http://localhost:8000/health || (echo "API never became healthy" && exit 1)

      - name: Wait for dashboard
        run: |
          for i in $(seq 1 20); do
            if curl -sf http://localhost:3001 > /dev/null; then
              echo "Dashboard is up"
              break
            fi
            sleep 3
          done

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install frontend dependencies
        working-directory: dashboard
        run: npm ci

      - name: Install Playwright browsers
        working-directory: dashboard
        run: npx playwright install --with-deps chromium

      - name: Run Docker E2E tests
        working-directory: dashboard
        run: npx playwright test --config=playwright.docker.config.ts
        env:
          PLAYWRIGHT_DOCKER_BASE_URL: http://localhost:3001

      - name: Show docker logs on failure
        if: failure()
        run: |
          docker compose -f deploy/docker-compose.yml -f deploy/docker-compose.e2e.yml -p e2e logs --tail=100

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-docker-report
          path: dashboard/playwright-report/
          retention-days: 7

      - name: Tear down stack
        if: always()
        run: |
          docker compose \
            -f deploy/docker-compose.yml \
            -f deploy/docker-compose.e2e.yml \
            -p e2e \
            down -v --remove-orphans

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test-python, test-e2e-mocked]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build SDK package
        run: |
          pip install build
          cd sdk/python && python -m build

      - name: Build CLI package
        run: |
          pip install build
          python -m build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: agentbreeder-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Dashboard image
        uses: docker/build-push-action@v6
        with:
          context: ./dashboard
          push: false
          tags: agentbreeder-dashboard:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build CLI image
        uses: docker/build-push-action@v6
        with:
          file: ./Dockerfile.cli
          push: false
          tags: agentbreeder-cli:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
