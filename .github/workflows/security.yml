name: Security

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Run weekly on Monday at 08:00 UTC (catch newly disclosed CVEs)
    - cron: "0 8 * * 1"

permissions:
  contents: read
  security-events: write   # Required for uploading SARIF to GitHub Security tab

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Python SAST (Bandit) ────────────────────────────────────────────────────
  bandit:
    name: Python SAST (Bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Bandit
        run: pip install bandit[sarif]

      - name: Run Bandit
        run: |
          bandit -r api/ engine/ cli/ registry/ connectors/ sdk/ \
            --format sarif \
            --output bandit-results.sarif \
            --severity-level medium \
            --confidence-level medium \
            -x venv/,tests/ \
            || true   # don't fail here; let SARIF upload decide

      - name: Upload Bandit SARIF
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true   # Requires GitHub Advanced Security
        with:
          sarif_file: bandit-results.sarif
          category: bandit

      - name: Fail on high-severity findings
        run: |
          bandit -r api/ engine/ cli/ registry/ connectors/ sdk/ \
            --severity-level high \
            --confidence-level high \
            -x venv/,tests/

  # ── Python dependency audit ─────────────────────────────────────────────────
  pip-audit:
    name: Dependency Audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Install project dependencies
        run: pip install -e ".[dev]"

      - name: Audit Python dependencies
        # Ignore CVE-2024-23342 (ecdsa): python-jose pulls in ecdsa as a
        # base dep, but we use the [cryptography] extra so ecdsa is never
        # used for actual crypto operations.  No fixed ecdsa version exists.
        # TODO: Replace python-jose with PyJWT to drop ecdsa entirely.
        run: pip-audit --skip-editable --ignore-vuln CVE-2024-23342

  # ── npm dependency audit ────────────────────────────────────────────────────
  npm-audit:
    name: Dependency Audit (npm audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - run: npm ci

      - name: Audit npm dependencies
        run: npm audit --audit-level=high

  # ── Container image scanning (Trivy) ───────────────────────────────────────
  trivy:
    name: Container Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image for scanning
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: agent-garden-api:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan API image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: agent-garden-api:scan
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"   # upload regardless; gate below

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true   # Requires GitHub Advanced Security
        with:
          sarif_file: trivy-results.sarif
          category: trivy

      - name: Fail on CRITICAL vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: agent-garden-api:scan
          format: table
          severity: CRITICAL
          exit-code: "1"

  # NOTE: dependency-review removed — requires GitHub Advanced Security
  # which is not available on this repository. Re-enable when GHAS is active.
  # See: https://github.com/open-agent-garden/agent-garden/settings/security_analysis

  # ── Secret scanning (detect hardcoded secrets) ──────────────────────────────
  secret-scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for gitleaks

      - name: Install Gitleaks
        run: |
          GITLEAKS_VERSION=8.18.4
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks

      - name: Gitleaks scan
        run: gitleaks detect --source . --no-git --config .gitleaks.toml
