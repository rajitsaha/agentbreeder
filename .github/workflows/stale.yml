name: Stale Issues & PRs

on:
  schedule:
    - cron: "0 6 * * *"   # daily at 06:00 UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Mark Stale
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          # Issues
          days-before-issue-stale: 60
          days-before-issue-close: 14
          stale-issue-label: "stale"
          stale-issue-message: >
            This issue has been automatically marked as stale because it has had no activity
            for 60 days. It will be closed in 14 days unless there is new activity.

            If this is still relevant, please:
            - Comment with a status update
            - Remove the `stale` label

            Thank you for your contributions to AgentBreeder!
          close-issue-message: >
            This issue has been closed due to inactivity. If you believe it's still relevant,
            please open a new issue with updated context.

          # PRs
          days-before-pr-stale: 30
          days-before-pr-close: 7
          stale-pr-label: "stale"
          stale-pr-message: >
            This pull request has been automatically marked as stale because it has had no
            activity for 30 days. It will be closed in 7 days unless there is new activity.

            If you're still working on this:
            - Push a new commit or rebase onto main
            - Remove the `stale` label
            - Comment with a status update

            Thank you for your contribution to AgentBreeder!
          close-pr-message: >
            This PR has been closed due to inactivity. Feel free to reopen if you resume work on it.

          # Labels that prevent staling
          exempt-issue-labels: "pinned,security,bug,critical,good first issue,help wanted"
          exempt-pr-labels: "pinned,security,do-not-close"

          # Don't close issues assigned to someone
          exempt-all-assignees: true

          # Milestoned issues/PRs are actively planned — don't stale them
          exempt-all-milestones: true

          operations-per-run: 100
