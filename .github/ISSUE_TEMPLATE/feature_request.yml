name: Feature Request
description: Suggest a new feature or enhancement
labels: ["type:feature"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea? We'd love to hear it. For major features, consider opening a [Discussion](https://github.com/open-agentbreeder/agentbreeder/discussions) first.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? What's the use case?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should this work? Include CLI commands, API endpoints, or UI mockups if relevant.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches did you consider?

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI
        - Dashboard
        - API / Backend
        - Registry
        - Deployer (new cloud target)
        - Runtime (new framework)
        - Documentation
        - Other
    validations:
      required: true
